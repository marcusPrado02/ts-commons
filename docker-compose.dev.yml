version: "3.9"

# ── Local development infrastructure ──────────────────────────────────────────
# Start with: docker compose -f docker-compose.dev.yml up -d
# Stop with:  docker compose -f docker-compose.dev.yml down
#
# Services:
#   kafka        — Apache Kafka (KRaft mode, no Zookeeper)
#   redis        — Redis 7 (cache, queues, pub/sub)
#   postgres     — PostgreSQL 16 (primary relational DB)
#   mongodb      — MongoDB 7 (document store)
#   localstack   — AWS services (S3, SQS, SNS, DynamoDB, SecretsManager)
#
# All data is stored in named volumes; services restart unless explicitly stopped.

volumes:
  kafka-data:
  redis-data:
  postgres-data:
  mongodb-data:
  localstack-data:

networks:
  dev:
    driver: bridge

services:
  # ── Kafka (KRaft, single-broker) ─────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: acme-kafka
    networks: [dev]
    ports:
      - "9092:9092" # external (host → container)
      - "9093:9093" # controller
    environment:
      # KRaft (no Zookeeper)
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_LOG_RETENTION_HOURS: "24"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Kafka UI ──────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: acme-kafka-ui
    networks: [dev]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: acme-redis
    networks: [dev]
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: acme-postgres
    networks: [dev]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme_dev_password
      POSTGRES_DB: acme_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d acme_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MongoDB 7 ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: acme-mongodb
    networks: [dev]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: acme
      MONGO_INITDB_ROOT_PASSWORD: acme_dev_password
      MONGO_INITDB_DATABASE: acme_dev
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── LocalStack (AWS) ──────────────────────────────────────────────────────────
  localstack:
    image: localstack/localstack:3
    container_name: acme-localstack
    networks: [dev]
    ports:
      - "4566:4566" # LocalStack gateway
    environment:
      SERVICES: s3,sqs,sns,dynamodb,secretsmanager,iam,sts
      DEBUG: "0"
      PERSISTENCE: "1"
      LOCALSTACK_AUTH_TOKEN: "" # community edition — leave empty
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\": \"running\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
